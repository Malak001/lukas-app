# Local development only — NOT for production. See README.md's "Local
# development" section. Ports are mapped explicitly (rather than
# network_mode: host, which Windows/Mac Docker Desktop don't support the same
# way Linux does), and the UDP range is kept small since this never needs to
# serve real internet traffic.
services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50019:50000-50019/udp"
    volumes:
      - ./livekit.local.yaml:/etc/livekit.yaml
